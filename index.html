<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Каталог товаров | СберПортал</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header-gradient">
    <h1>
        <span>📚</span> Каталог товаров
    </h1>
    <div class="greeting" id="greetingMessage">Добро пожаловать! 👋</div>
    <div class="header-sub">Выберите ваш факультет</div>
</div>

<div class="main-container">
    <!-- Сетка категорий (8 блоков) -->
    <div class="categories-grid" id="categoriesGrid"></div>

    <!-- Информационная карточка: как это работает -->
    <div class="info-card">
        <div class="info-title">
            <span style="font-size: 1.4rem;">💡</span>
            <span>Как это работает?</span>
        </div>
        <div class="info-steps">
            <div class="step-item">
                <div class="step-number">1</div>
                <span>Выберите факультет, предмет и работу</span>
            </div>
            <div class="step-item">
                <div class="step-number">2</div>
                <span>Нажмите "Купить" и оплатите</span>
            </div>
            <div class="step-item">
                <div class="step-number">3</div>
                <span>Получите файл автоматически после оплаты</span>
            </div>
        </div>
    </div>

    <!-- Поддержка -->
    <div class="support-block">
        <p>Нужна помощь? Напишите в поддержку</p>
        <div class="support-username" id="supportUsername">@support_username</div>
    </div>
</div>

<script>
let tg = window.Telegram?.WebApp;

if (tg) {
    tg.ready();
}

const params = new URLSearchParams(window.location.search);
const needSendOrder = params.get('send_order');

if (needSendOrder === '1' && tg && tg.sendData) {
    const rawOrder = localStorage.getItem('pendingOrderData');

    if (rawOrder) {
        try {
            tg.sendData(rawOrder);
            localStorage.removeItem('pendingOrderData');
            tg.close();
        } catch (e) {
            console.error('Ошибка отправки данных в Telegram:', e);
            alert('Ошибка отправки заказа');
        }
    } else {
        alert('Нет данных заказа для отправки');
    }
}
    // ============================================================
    // ДАННЫЕ КАТЕГОРИЙ (8 факультетов)
    // ============================================================
    const categories = [
        {
            id: 'itu',
            name: 'ИТУ',
            description: 'Информационно-технологический университет',
            icon: 'FlaskConical',
            iconEmoji: '💻'
        },
        {
            id: 'str',
            name: 'Строительный',
            description: 'Строительный факультет',
            icon: 'FileText',
            iconEmoji: '📄'
        },
        {
            id: 'upp',
            name: 'УПП',
            description: 'Управление процессами перевозок',
            icon: 'Code',
            iconEmoji: '💻'
        },
        {
            id: 'elm',
            name: 'Электромеханический',
            description: 'Электромеханический факультет',
            icon: 'BookOpen',
            iconEmoji: '📖'
        },
        {
            id: 'energ',
            name: 'Энергетический',
            description: 'Энергетический факультет',
            icon: 'FlaskConical',
            iconEmoji: '🤖'
        },
        {
            id: 'dsm',
            name: 'ДСМ',
            description: 'Дорожно-строительные машины',
            icon: 'BookOpen',
            iconEmoji: '🎨'
        },
        {
            id: 'eup',
            name: 'ЭУП',
            description: 'Экономика, управление и право',
            icon: 'FileText',
            iconEmoji: '📊'
        },
        {
            id: 'gum',
            name: 'Гуманитарный',
            description: 'Гуманитарный факультет',
            icon: 'Code',
            iconEmoji: '🔒'
        }
    ];
    
    function getIconHtml(categoryId, iconEmoji) {
        const iconImages = {
            'itu': './materials/fakults/ITU.jpg',
            'str': './materials/fakults/STR.jpg',
            'upp': './materials/fakults/UPP.jpg',
            'elm': './materials/fakults/ELM.jpg',
            'energ': './materials/fakults/ENERG.jpg',
            'dsm': './materials/fakults/DSM.jpg',
            'eup': './materials/fakults/EUP.jpg',
            'gum': './materials/fakults/GUM.jpg'
        };
        
        const imagePath = iconImages[categoryId] || 'images/default.jpg';
        return `<img src="${imagePath}" alt="icon" style="width: 100%; height: 100%; object-fit: cover; border-radius: 0.875rem;">`;
    }
    
    // Функция навигации при клике на факультет - РЕАЛЬНЫЙ ПЕРЕХОД
    function handleCategoryClick(categoryId, categoryName) {
        // haptic feedback эффект
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(30);
        }
        
        // РЕАЛЬНЫЙ ПЕРЕХОД на страницу предметов с параметрами
        window.location.href = `items.html?cat=${categoryId}&name=${encodeURIComponent(categoryName)}`;
		// window.location.href = `new_item.html?cat=${categoryId}&name=${encodeURIComponent(categoryName)}`;

    }
    
    // Рендер всех категорий (8 блоков)
    function renderCategories() {
        const container = document.getElementById('categoriesGrid');
        if (!container) return;
        
        let html = '';
        categories.forEach((cat, idx) => {
            html += `
                <div class="category-card" data-id="${cat.id}" data-name="${escapeHtml(cat.name)}" data-index="${idx}">
                    <div class="card-inner">
                        <div class="card-left">
                            <div class="icon-wrapper">
                                ${getIconHtml(cat.id, cat.iconEmoji)}
                            </div>
                            <div class="category-info">
                                <h3>${escapeHtml(cat.name)}</h3>
                                <p>${escapeHtml(cat.description)}</p>
                            </div>
                        </div>
                        <div class="chevron-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
        
        // Добавляем обработчики кликов на каждую карточку
        const cards = document.querySelectorAll('.category-card');
        cards.forEach(card => {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                const catId = card.getAttribute('data-id');
                const catName = card.getAttribute('data-name');
                if (catId && catName) {
                    handleCategoryClick(catId, catName);
                }
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function showToast(message) {
        const existingToast = document.querySelector('.toast-message');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => toast.classList.add('show'), 10);
        
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(50);
        }
        
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 2000);
    }
    
    function getUserName() {
        let firstName = null;
        const urlParams = new URLSearchParams(window.location.search);
        const tgUser = urlParams.get('tg_user');
        if (tgUser) {
            try {
                const userObj = JSON.parse(decodeURIComponent(tgUser));
                if (userObj.first_name) firstName = userObj.first_name;
            } catch(e) { console.warn(e); }
        }
        if (window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name) {
            firstName = window.Telegram.WebApp.initDataUnsafe.user.first_name;
        }
        const storedName = localStorage.getItem('demo_user_name');
        if (storedName && !firstName) firstName = storedName;
        
        if (firstName) {
            return `Привет, ${firstName}! 👋`;
        }
        return 'Добро пожаловать! 👋';
    }
    
    function setupUI() {
        const greetingEl = document.getElementById('greetingMessage');
        if (greetingEl) {
            greetingEl.textContent = getUserName();
        }
        
        const supportEl = document.getElementById('supportUsername');
        if (supportEl) {
            supportEl.addEventListener('click', () => {
                const supportText = supportEl.textContent;
                if (navigator.clipboard && supportText) {
                    navigator.clipboard.writeText(supportText).then(() => {
                        showToast(`Скопировано: ${supportText}`, true);
                    }).catch(() => {
                        showToast(`Поддержка: ${supportText}`, false);
                    });
                } else {
                    showToast(`Напишите в поддержку: ${supportText}`, false);
                }
                if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(20);
            });
        }
    }
    
    function init() {
        renderCategories();
        setupUI();
        
        if (window.Telegram?.WebApp) {
            try {
                window.Telegram.WebApp.BackButton.hide();
                window.Telegram.WebApp.expand();
            } catch(e) { console.warn('Telegram WebApp не доступен'); }
        }
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
</body>
</html>
