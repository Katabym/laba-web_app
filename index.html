<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Каталог товаров | СберПортал</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="header-gradient">
    <h1>
        <span>📚</span> Каталог товаров
    </h1>
    <div class="greeting" id="greetingMessage">Добро пожаловать! 👋</div>
    <div class="header-sub">Выберите ваш факультет</div>
</div>

<div class="main-container">
    <div class="categories-grid" id="categoriesGrid"></div>

    <div class="info-card">
        <div class="info-title">
            <span style="font-size: 1.4rem;">💡</span>
            <span>Как это работает?</span>
        </div>
        <div class="info-steps">
            <div class="step-item">
                <div class="step-number">1</div>
                <span>Выберите факультет, предмет и работу</span>
            </div>
            <div class="step-item">
                <div class="step-number">2</div>
                <span>Нажмите "Купить" и оформите заказ</span>
            </div>
            <div class="step-item">
                <div class="step-number">3</div>
                <span>Получите файл автоматически после оплаты</span>
            </div>
        </div>
    </div>

    <div class="support-block">
        <p>Нужна помощь? Напишите в поддержку</p>
        <div class="support-username" id="supportUsername">@support_username</div>
    </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
    tg.ready();
    tg.expand();
    try {
        tg.BackButton.hide();
    } catch (e) {}
}

const categories = [
    { id: 'itu', name: 'ИТУ', description: 'Информационно-технологический университет' },
    { id: 'str', name: 'Строительный', description: 'Строительный факультет' },
    { id: 'upp', name: 'УПП', description: 'Управление процессами перевозок' },
    { id: 'elm', name: 'Электромеханический', description: 'Электромеханический факультет' },
    { id: 'energ', name: 'Энергетический', description: 'Энергетический факультет' },
    { id: 'dsm', name: 'ДСМ', description: 'Дорожно-строительные машины' },
    { id: 'eup', name: 'ЭУП', description: 'Экономика, управление и право' },
    { id: 'gum', name: 'Гуманитарный', description: 'Гуманитарный факультет' }
];

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;'
    })[m] || m);
}

function getIconHtml(categoryId) {
    const iconImages = {
        itu: './materials/fakults/ITU.jpg',
        str: './materials/fakults/STR.jpg',
        upp: './materials/fakults/UPP.jpg',
        elm: './materials/fakults/ELM.jpg',
        energ: './materials/fakults/ENERG.jpg',
        dsm: './materials/fakults/DSM.jpg',
        eup: './materials/fakults/EUP.jpg',
        gum: './materials/fakults/GUM.jpg'
    };

    const imagePath = iconImages[categoryId] || './materials/fakults/default.jpg';
    return `<img src="${imagePath}" alt="icon" style="width: 100%; height: 100%; object-fit: cover; border-radius: 0.875rem;">`;
}

function handleCategoryClick(categoryId, categoryName) {
    localStorage.setItem('lastCategoryId', categoryId);
    localStorage.setItem('lastCategoryName', categoryName);
    window.location.href = `items.html?cat=${encodeURIComponent(categoryId)}&name=${encodeURIComponent(categoryName)}`;
}

function renderCategories() {
    const container = document.getElementById('categoriesGrid');
    if (!container) return;

    container.innerHTML = categories.map((cat, idx) => `
        <div class="category-card" data-id="${cat.id}" data-name="${escapeHtml(cat.name)}" data-index="${idx}">
            <div class="card-inner">
                <div class="card-left">
                    <div class="icon-wrapper">
                        ${getIconHtml(cat.id)}
                    </div>
                    <div class="category-info">
                        <h3>${escapeHtml(cat.name)}</h3>
                        <p>${escapeHtml(cat.description)}</p>
                    </div>
                </div>
                <div class="chevron-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>
            </div>
        </div>
    `).join('');

    document.querySelectorAll('.category-card').forEach(card => {
        card.addEventListener('click', () => {
            const catId = card.getAttribute('data-id');
            const catName = card.getAttribute('data-name');
            handleCategoryClick(catId, catName);
        });
    });
}

function getUserName() {
    const name = window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name;
    return name ? `Привет, ${name}! 👋` : 'Добро пожаловать! 👋';
}

function setupUI() {
    const greetingEl = document.getElementById('greetingMessage');
    if (greetingEl) greetingEl.textContent = getUserName();

    const supportEl = document.getElementById('supportUsername');
    if (supportEl) {
        supportEl.addEventListener('click', () => {
            const text = supportEl.textContent.trim();
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).catch(() => {});
            }
        });
    }
}

function init() {
    renderCategories();
    setupUI();
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>

</body>
</html>
