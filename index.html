<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Каталог товаров | СберПортал</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header-gradient">
    <h1>
        <span>📚</span> Каталог товаров
    </h1>
    <div class="greeting" id="greetingMessage">Добро пожаловать! 👋</div>
    <div class="header-sub">Выберите ваш факультет</div>
</div>

<div class="main-container">
    <!-- Сетка категорий (8 блоков) -->
    <div class="categories-grid" id="categoriesGrid"></div>

    <!-- Информационная карточка: как это работает -->
    <div class="info-card">
        <div class="info-title">
            <span style="font-size: 1.4rem;">💡</span>
            <span>Как это работает?</span>
        </div>
        <div class="info-steps">
            <div class="step-item">
                <div class="step-number">1</div>
                <span>Выберите категорию и товар</span>
            </div>
            <div class="step-item">
                <div class="step-number">2</div>
                <span>Нажмите "Купить" и оплатите</span>
            </div>
            <div class="step-item">
                <div class="step-number">3</div>
                <span>Получите файл автоматически после оплаты</span>
            </div>
        </div>
    </div>

    <!-- Поддержка -->
    <div class="support-block">
        <p>Нужна помощь? Напишите в поддержку</p>
        <div class="support-username" id="supportUsername">@support_username</div>
    </div>
</div>

<script>
    // ============================================================
    // ДАННЫЕ КАТЕГОРИЙ (8 штук) с иконками и описаниями
    // Полностью соответствует стилю React-компонента
    // ============================================================
    const categories = [
        {
            id: 'itu',
            name: 'ИТУ',
            description: 'Лабораторное оборудование и реагенты',
            icon: 'FlaskConical',
            iconEmoji: '💻'
        },
        {
            id: 'documents',
            name: 'Строительный',
            description: 'Строительный',
            icon: 'FileText',
            iconEmoji: '📄'
        },
        {
            id: 'development',
            name: 'Программирование',
            description: 'Код, скрипты, фреймворки',
            icon: 'Code',
            iconEmoji: '💻'
        },
        {
            id: 'education',
            name: 'Образование',
            description: 'Книги, курсы, методические материалы',
            icon: 'BookOpen',
            iconEmoji: '📖'
        },
        {
            id: 'ai_tools',
            name: 'AI инструменты',
            description: 'Нейросети, промты, автоматизация',
            icon: 'FlaskConical',
            iconEmoji: '🤖'
        },
        {
            id: 'design',
            name: 'Дизайн',
            description: 'Шаблоны, UI kits, графика',
            icon: 'BookOpen',
            iconEmoji: '🎨'
        },
        {
            id: 'business',
            name: 'Бизнес-шаблоны',
            description: 'Презентации, стратегии, отчеты',
            icon: 'FileText',
            iconEmoji: '📊'
        },
        {
            id: 'security',
            name: 'Кибербезопасность',
            description: 'Чек-листы, гайды, инструменты',
            icon: 'Code',
            iconEmoji: '🔒'
        }
    ];
	
	
	function getIconHtml(categoryId, iconEmoji) {
    // Здесь укажите пути к вашим JPG изображениям для каждой категории
    const iconImages = {
        'itu': './materials/fakults/ITU.jpg',
        'documents': 'images/documents.jpg',
        'development': 'images/development.jpg',
        'education': 'images/education.jpg',
        'ai_tools': 'images/ai_tools.jpg',
        'design': 'images/design.jpg',
        'business': 'images/business.jpg',
        'security': 'images/security.jpg'
    };
    
    const imagePath = iconImages[categoryId] || 'images/default.jpg';
    
    return `<img src="${imagePath}" alt="icon" style="width: 100%; height: 100%; object-fit: cover; border-radius: 0.875rem;">`;
}
	
    // Генерация SVG иконок на основе типа (как lucide-react но нативная реализация)
    function getIconSvg(iconType, color = 'currentColor') {
        // Создаем простые SVG иконки в стиле lucide
        switch (iconType) {
            case 'FlaskConical':
                return `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10 2v6.5c0 .4-.2.8-.5 1.1L5 14c-.5.6-.5 1.4 0 2l3 3c.6.5 1.4.5 2 0l5-5c.3-.3.5-.7.5-1.1V2h-5z"/>
                            <path d="M14 2v6.5c0 .4.2.8.5 1.1L19 14c.5.6.5 1.4 0 2l-3 3c-.6.5-1.4.5-2 0l-5-5"/>
                        </svg>`;
            case 'FileText':
                return `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>`;
            case 'Code':
                return `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16 18 22 12 16 6"/>
                            <polyline points="8 6 2 12 8 18"/>
                        </svg>`;
            case 'BookOpen':
                return `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                        </svg>`;
            default:
                return `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="16"/>
                            <line x1="8" y1="12" x2="16" y2="12"/>
                        </svg>`;
        }
    }

    // Функция для показа уведомления (haptic feedback + toast)
    function showToast(message, isSuccess = true) {
        // Удаляем предыдущий тост, если есть
        const existingToast = document.querySelector('.toast-message');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = message;
        document.body.appendChild(toast);
        
        // Триггер анимации
        setTimeout(() => toast.classList.add('show'), 10);
        
        // Вибрация (haptic feedback) если поддерживается
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(50);
        }
        
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 2000);
    }
    
    // Получение имени пользователя (имитация Telegram контекста / просто приветствие)
    // В нативном варианте можно получить из URL параметров или localStorage
    function getUserName() {
        // Можно подставить имя из локального хранилища, но для демо создадим приветствие
        // как в React компоненте: user?.first_name ? ... 
        let firstName = null;
        // Пытаемся получить из параметров URL (для интеграции с TG WebApp)
        const urlParams = new URLSearchParams(window.location.search);
        const tgUser = urlParams.get('tg_user');
        if (tgUser) {
            try {
                const userObj = JSON.parse(decodeURIComponent(tgUser));
                if (userObj.first_name) firstName = userObj.first_name;
            } catch(e) { console.warn(e); }
        }
        // Или проверяем window.Telegram?.WebApp
        if (window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name) {
            firstName = window.Telegram.WebApp.initDataUnsafe.user.first_name;
        }
        // Или используем localStorage тестовое
        const storedName = localStorage.getItem('demo_user_name');
        if (storedName && !firstName) firstName = storedName;
        
        if (firstName) {
            return `Привет, ${firstName}! 👋`;
        }
        return 'Добро пожаловать! 👋';
    }
    
    // Эмуляция hapticFeedback и hideBackButton (для нативного веба просто симулируем)
    // Функция навигации при клике на категорию
    function handleCategoryClick(categoryId, categoryName) {
        // haptic feedback эффект (вибрация + тост)
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(30);
        }
        // показываем уведомление как в React: hapticFeedback('success') + навигация
        showToast(`📁 Категория: ${categoryName}`, true);
        
        // Имитируем переход на страницу категории (можно изменить на реальный роутинг)
        // В оригинале: navigate(`/category/${categoryId}`);
        // Здесь добавим задержку для визуального эффекта, затем симуляция перехода
        setTimeout(() => {
            // можно вывести в консоль или сделать реальный переход (если есть другая страница)
            console.log(`[Navigation] Переход в категорию: ${categoryId} — ${categoryName}`);
            // Для демонстрации просто покажем alert-like toast
            showToast(`✨ Открываю раздел "${categoryName}"`, false);
            // В реальном приложении тут был бы window.location.href = `/category/${categoryId}`
            // Но так как это одна страница, просто имитируем
        }, 150);
    }
    
    // Рендер всех категорий (8 блоков)
    function renderCategories() {
        const container = document.getElementById('categoriesGrid');
        if (!container) return;
        
        let html = '';
        categories.forEach((cat, idx) => {
            // выбираем тип иконки (icon) или fallback
            // const iconType = cat.icon;
            // const iconSvg = getIconSvg(iconType);
            // Делаем атрибут data для идентификации
            html += `
                <div class="category-card" data-id="${cat.id}" data-name="${escapeHtml(cat.name)}" data-index="${idx}">
                    <div class="card-inner">
                        <div class="card-left">
                            <div class="icon-wrapper">
                                ${getIconHtml(cat.id, cat.iconEmoji)}
                            </div>
                            <div class="category-info">
                                <h3>${escapeHtml(cat.name)}</h3>
                                <p>${escapeHtml(cat.description)}</p>
                            </div>
                        </div>
                        <div class="chevron-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
        
        // Добавляем обработчики кликов на каждую карточку
        const cards = document.querySelectorAll('.category-card');
        cards.forEach(card => {
            card.addEventListener('click', (e) => {
                // Не даем всплывать, чтобы случайно не сработало дважды
                e.stopPropagation();
                const catId = card.getAttribute('data-id');
                const catName = card.getAttribute('data-name');
                if (catId && catName) {
                    handleCategoryClick(catId, catName);
                }
            });
        });
    }
    
    // Helper для экранирования
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // Установка приветствия и поддержки
    function setupUI() {
        const greetingEl = document.getElementById('greetingMessage');
        if (greetingEl) {
            greetingEl.textContent = getUserName();
        }
        
        // Копирование ссылки поддержки при клике
        const supportEl = document.getElementById('supportUsername');
        if (supportEl) {
            supportEl.addEventListener('click', () => {
                const supportText = supportEl.textContent;
                if (navigator.clipboard && supportText) {
                    navigator.clipboard.writeText(supportText).then(() => {
                        showToast(`Скопировано: ${supportText}`, true);
                    }).catch(() => {
                        showToast(`Поддержка: ${supportText}`, false);
                    });
                } else {
                    showToast(`Напишите в поддержку: ${supportText}`, false);
                }
                // haptic
                if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(20);
            });
        }
    }
    
    // Инициализация приложения
    function init() {
        renderCategories();
        setupUI();
        
        // Эмуляция hideBackButton (просто для логики: в нативном вебе нет кнопки назад как в Telegram)
        // Сообщаем в консоль, что backButton скрыт (аналог useTelegram)
        if (window.Telegram?.WebApp) {
            try {
                window.Telegram.WebApp.BackButton.hide();
                window.Telegram.WebApp.expand();
            } catch(e) { console.warn('Telegram WebApp не доступен'); }
        } else {
            console.log('[Demo] Режим без Telegram: backButton скрыт (эмуляция)');
        }
    }
    
    // Запускаем после загрузки DOM
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
</body>
</html>
