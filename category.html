        // ИНИЦИАЛИЗАЦИЯ СТРАНИЦЫ

        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('cat') || 'nature';
        const categoryName = urlParams.get('name') || 'Категория';

        // Обновляем заголовки
        document.getElementById('category-title').textContent = categoryName;
        document.getElementById('category-breadcrumb').textContent = categoryName;
        document.title = `СберПортал - ${categoryName}`;

        // =====================================================
        // РЕНДЕРИНГ ГАЛЕРЕИ
        // =====================================================
        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            const items = galleryData[category] || galleryData.nature;

            grid.innerHTML = items.map((item, index) => {
                const mainUrl = getMediaUrl(item.main, 'jpg');
                const hoverUrl = getMediaUrl(item.hover, 'jpg');
                
                return `
                    <a href="article.html?cat=${category}&name=${encodeURIComponent(categoryName)}&idx=${index}&title=${encodeURIComponent(item.title)}&img=${encodeURIComponent(item.main)}" class="gallery-card">
                        <img class="main-img" src="${mainUrl}" alt="${item.title}">
                        <img class="hover-img" src="${hoverUrl}" alt="${item.title}">
                    </a>
                `;
            }).join('');
        }

        // Инициализация
        renderGallery();
