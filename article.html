<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СберПортал - Статья</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="index.html" class="logo">СберПортал</a>
        <nav class="breadcrumb">
            <a href="index.html">Главная</a>
            <span class="separator">›</span>
            <a href="#" id="category-link">Категория</a>
            <span class="separator">›</span>
            <span id="article-breadcrumb">Статья</span>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-container article-main">
        <a href="#" id="back-link" class="back-btn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Назад
        </a>

        <article class="article-container">
            <!-- Фото на всю ширину сверху -->
            <div class="article-hero-wrapper">
                <img class="article-hero" id="article-image" src="" alt="Article Hero">
            </div>

            <!-- Контейнер с двумя колонками -->
            <div class="article-columns">
                <!-- Левая колонка: текстовый контент (75%) -->
                <div class="article-left">
                    <div class="article-body">
                        <!-- Аудио элемент -->
                        <audio id="articleAudio" preload="auto"></audio>

                        <!-- Панель кнопок -->
                        <div class="action-buttons">
                            <button class="listen-btn" id="listenBtn" onclick="toggleAudio()">
                                <svg id="playIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/>
                                </svg>
                                <svg id="pauseIcon" style="display:none;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                <span id="listenBtnText">Прослушать краткое описание</span>
                            </button>

                            <!-- Кнопка Скачать с выпадающим меню -->
                            <div class="dropdown">
                                <button class="download-btn" onclick="toggleDropdown(this)">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                                    </svg>
                                    Скачать
                                    <svg class="dropdown-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                                    </svg>
                                </button>
                                <div class="dropdown-menu" id="download-menu">
                                    <a href="#" class="dropdown-item" id="download-summary" download>
                                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                        </svg>
                                        Краткое описание .docx
                                    </a>
                                    <a href="#" class="dropdown-item" id="download-full" download>
                                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                        </svg>
                                        Полную стенограмму .docx
                                    </a>
                                    <a href="#" class="dropdown-item" id="download-table" download>
                                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                        </svg>
                                        Таблицу .xlsx
                                    </a>
                                    <a href="#" class="dropdown-item" id="download-audio" download>
                                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
                                        </svg>
                                        Аудио .mp4
                                    </a>
                                </div>
                            </div>

                            <!-- Кнопка-иконка со ссылкой -->
                            <a href="#" class="link-btn" id="external-link" title="Открыть источник" target="_blank">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                                </svg>
                            </a>
                        </div>
                        
                        <h1 class="article-title" id="article-title">Удивительный мир</h1>
                        
                        <div class="article-meta">
                            <span>📅 15 января 2024</span>
                            <span>👁 2,450 просмотров</span>
                            <span>⏱ 5 мин чтения</span>
                        </div>
                        
                        <div class="article-text" id="article-text">
                            <p>Текст статьи загружается...</p>
                        </div>
                    </div>
                </div>

                <!-- Правая колонка: графики и таблицы (25%) -->
                <div class="article-right">
                    <div class="chart-section" id="chart-section">
                        <h3 class="chart-title">☁️ Облако ключевых слов</h3>
                        <div class="word-cloud" id="word-cloud">
                            <!-- Слова будут добавлены через JavaScript -->
                        </div>
                        
                        <button class="expand-data" id="expand-btn" onclick="toggleTable()">
                            <span>Полностью посмотреть данные</span>
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </button>
                        
                        <div class="data-table" id="data-table">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Слово</th>
                                        <th>Количество</th>
                                    </tr>
                                </thead>
                                <tbody id="table-body">
                                    <!-- Данные будут добавлены через JavaScript -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </article>
    </main>

    <!-- Подключаем утилиты и скрипт статьи -->
    <script src="utils.js"></script>
    <script src="article.js"></script>
</body>
</html>
