<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="color-scheme" content="light" />
    <meta name="description" content="Telegram WebApp для покупки лабораторных работ и проектов" />
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <title>StudyMarket - Каталог товаров</title>
    
    <style>
      /* Safe area insets для iPhone с челкой */
      .safe-area-top {
        padding-top: env(safe-area-inset-top);
      }
      .safe-area-bottom {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .safe-area-left {
        padding-left: env(safe-area-inset-left);
      }
      .safe-area-right {
        padding-right: env(safe-area-inset-right);
      }
      
      /* Скрыть scrollbar но оставить скролл */
      body {
        scrollbar-width: thin;
        scrollbar-color: transparent transparent;
      }
      body::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      
      /* Плавные переходы */
      * {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body class="safe-area-top safe-area-bottom safe-area-left safe-area-right">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
